name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Current version ───────────────────────────────────────────────────────
      - name: Get current version
        id: current
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"    >> "$GITHUB_OUTPUT"

      # ── Determine bump type ───────────────────────────────────────────────────
      # Manual dispatch: use the chosen input.
      # Push to main: read conventional commits since the last tag.
      #   breaking change  (any type with ! before the colon) → major
      #   feat                                                 → minor
      #   everything else  (fix, chore, docs, ci, …)          → patch
      #   no new commits                                       → skip
      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TAG="${{ steps.current.outputs.tag }}"

          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "type=skip" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE '^.+!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── Compute new version ───────────────────────────────────────────────────
      - name: Compute new version
        id: version
        if: steps.bump.outputs.type != 'skip'
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW"   >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"    >> "$GITHUB_OUTPUT"

      # ── Changelog ─────────────────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.type != 'skip'
        run: |
          LAST_TAG="${{ steps.current.outputs.tag }}"
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s")
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Tag & release ─────────────────────────────────────────────────────────
      - name: Create and push tag
        if: steps.bump.outputs.type != 'skip'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.bump.outputs.type != 'skip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}"
